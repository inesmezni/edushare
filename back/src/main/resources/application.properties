# ========================
# APPLICATION CONFIG
# ========================
spring.application.name=edushare-backend
server.port=8082

# ========================
# DATABASE CONFIG
# ========================
spring.datasource.url=jdbc:mysql://localhost:3306/edushare_db
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========================
# JPA / HIBERNATE CONFIG
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

# ========================
# SWAGGER CONFIG
# ========================
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.oauth.client-id=test-client
springdoc.swagger-ui.oauth.realm=test-realm
springdoc.swagger-ui.oauth.app-name=EduShare API

# ========================
# FILE UPLOAD CONFIG
# ========================
file.upload-dir=uploads
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB
spring.servlet.multipart.enabled=true

# ========================
# JWT CONFIG
# ========================
jwt.secret=mySecretKey12345678901234567890123456789012345678901234567890
jwt.expiration=604800000

# ========================
# LOGGING CONFIG
# ========================
logging.level.com.edushare_backend=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=OFF